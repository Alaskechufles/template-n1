<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body class="min-h-screen bg-black flex flex-col justify-center items-center">
    <main
      class="bg-gray-200 w-[95%] max-w-md md:max-w-3xl flex flex-col md:flex-row p-10 rounded-3xl items-center justify-center"
    >
      <section class="flex flex-col items-center justify-center md:w-1/2">
        <img
          class="w-37.5 rounded-full"
          src="../assets/pc2/perfil-1x1.png"
          alt="imagen de Diego pro"
        />
        <h1 class="text-3xl font-bold">Diego Huarsaya</h1>
        <p class="text-2xl">Arequipa, Perú</p>
        <q class="italic text-2xl">"Si funciona no le muevas"</q>
      </section>
      <section class="flex flex-col w-full gap-3 mt-10 md:w-1/2">
        <button
          class="bg-gray-600 text-white py-3 rounded-2xl active:text-black active:bg-gray-300 hover:scale-105 duration-300 ease-out"
        >
          Github
        </button>
        <button
          class="bg-gray-600 text-white py-3 rounded-2xl active:text-black active:bg-gray-300 hover:scale-105 duration-300 ease-out"
        >
          Facebook
        </button>
        <button
          class="bg-gray-600 text-white py-3 rounded-2xl active:text-black active:bg-gray-300 hover:scale-105 duration-300 ease-out"
        >
          Instagram
        </button>
        <button
          class="bg-gray-600 text-white py-3 rounded-2xl active:text-black active:bg-gray-300 hover:scale-105 duration-300 ease-out"
        >
          Youtube
        </button>
        <button
          class="bg-gray-600 text-white py-3 rounded-2xl active:text-black active:bg-gray-300 hover:scale-105 duration-300 ease-out"
        >
          Funval
        </button>
      </section>
    </main>
    <div
      class="bg-white text-2xl p-5 border-4 border-red-600 md:absolute md:right-30 md:bottom-1/5 md:rotate-12 rounded-2xl duration-300 ease-out"
    >
      <p>Lorem ipsum dolor sit amet.</p>
    </div>
    <div
      class="bg-white text-2xl p-5 border-4 border-green-600 md:absolute md:left-30 md:top-1/4 md:-rotate-12 rounded-2xl duration-300 ease-out"
    >
      <p>Lorem ipsum dolor sit amet.</p>
    </div>
  </body>
</html>
