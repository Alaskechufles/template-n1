<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>template-n1</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body
    id="body"
    class="bg-gray-300 min-h-screen flex justify-center items-center"
  >
    <main class="bg-white rounded-3xl max-w-100 overflow-hidden shadow">
      <img
        src="./assets/home/illustration-hero.svg"
        alt="dibujo de persona escuchando música"
      />
      <section class="p-8 flex justify-center items-center flex-col gap-3">
        <h1 class="font-bold text-2xl">Order Summary</h1>
        <p class="text-center text-[#7280a7]">
          Lorem ipsum dolor sit amet, consectetur adipisicing elit. Sequi hic
          alias assumenda fugit illo eaque quaerat
        </p>
        <div class="bg-[#f5f7ff] flex gap-5 p-6 rounded-2xl">
          <img src="./assets/home/icon-music.svg" alt="" />
          <div class="flex flex-col">
            <span class="font-bold">Annual Plan</span>
            <span class="text-[#7280a7]">$59.99/year</span>
          </div>
          <button
            class="ml-7 underline text-[#3829e0] font-bold active:text-[#3829e0c7] active:no-underline cursor-pointer"
          >
            Change
          </button>
        </div>
        <button
          class="bg-[#3829e0] text-white font-bold w-[95%] h-14 rounded-xl hover:bg-[#3829e0c7] cursor-pointer"
        >
          pagar
        </button>
        <button
          class="font-bold text-[#7280a7] active:text-black cursor-pointer"
        >
          Cancel Order
        </button>
      </section>
    </main>
  </body>
</html>
